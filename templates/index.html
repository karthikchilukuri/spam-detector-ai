<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Spam Detector</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
    color: white;
}

.container {
    max-width: 600px;
    margin: 50px auto;
    background: #2c2c3e;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-bottom: 15px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #6c5ce7;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #5a4bd6;
}

.result {
    margin-top: 15px;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
}

.spam { background: #ff4d4d; }
.not-spam { background: #00c853; }

.loader {
    display: none;
    margin: 10px auto;
    border: 4px solid #ccc;
    border-top: 4px solid #6c5ce7;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.history {
    margin-top: 25px;
}

.history-item {
    background: #1f1f2e;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
}
</style>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</head>
<body>

<div class="container">
    <h1>🤖 AI Spam Detector</h1>

    <form method="POST" onsubmit="showLoader()">
        <input type="text" name="message" placeholder="Enter message..." required>
        <button type="submit">Analyze</button>
    </form>

    <div id="loader" class="loader"></div>

    {% if prediction %}
        <div class="result {{ 'spam' if 'Spam' in prediction else 'not-spam' }}">
            {{ prediction }}
        </div>
    {% endif %}

    <div class="history">
        <h3>📜 History</h3>
        {% for item in history %}
            <div class="history-item">
                <b>{{ item.message }}</b><br>
                {{ item.prediction }}
            </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
